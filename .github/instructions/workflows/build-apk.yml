name: Manual APK Build & R2 Upload

on:
  workflow_dispatch:
    # Optional inputs you can fill out when clicking "Run workflow"
    inputs:
      version_name:
        description: 'Version Name (e.g., 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK to Cloudflare R2
        env:
          # Pulling credentials securely from GitHub Secrets
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        # Renames the file during upload to include your version input and run number
        run: |
          aws s3 cp build/app/outputs/flutter-apk/app-release.apk \
          s3://${{ secrets.R2_BUCKET_NAME }}/app-v${{ github.event.inputs.version_name }}-b${{ github.run_number }}.apk \
          --endpoint-url ${{ secrets.R2_ENDPOINT_URL }}